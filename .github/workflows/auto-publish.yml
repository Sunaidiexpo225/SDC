name: Auto-publish scheduled posts

# Publishes approved posts when their scheduled time arrives. Vercel Hobby cron
# only runs once/day, so we drive this from GitHub Actions (free) every 5 min.
#
# Setup (one time) — same CRON_SECRET as the analytics workflow:
#  1. In Vercel → Project → Settings → Environment Variables, add CRON_SECRET
#     (any long random string). Optionally add PUBLISH_TZ (default "+03:00").
#     Redeploy.
#  2. In GitHub → repo → Settings → Secrets and variables → Actions, add a
#     secret CRON_SECRET with the SAME value (and optionally an APP_URL var).

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (GitHub may delay under load)
  workflow_dispatch: {} # allows manual runs from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Ping auto-publish endpoint
        env:
          APP_URL: ${{ vars.APP_URL || 'https://sdc-beryl.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not set — skipping (see workflow header for setup)."
            exit 0
          fi
          curl -sS -X GET "$APP_URL/api/cron/publish-due" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 90 --fail-with-body
